server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # ✅ Proxy vers le backend Spring pour /analytics (SSE)
    location /analytics {
        proxy_pass http://backend:8081/analytics;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;          # ✅ CRUCIAL pour SSE
        proxy_cache off;
        proxy_read_timeout 86400s;
        chunked_transfer_encoding on;
    }

    # ✅ Proxy vers le backend Spring pour /publish
    location /publish {
        proxy_pass http://backend:8081/publish;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}